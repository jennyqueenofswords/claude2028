<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLAUDE 2028 — Bumper Sticker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --navy: #1b2a4a;
    --navy-deep: #0f1a2e;
    --red: #c41230;
    --cream: #f5f1eb;
    --gold: #c5a55a;
    --blue-muted: #8fa3c4;
    --text: #2a2a2a;
    --text-light: #5a6a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy-deep);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .sticker {
    background: var(--navy);
    border-radius: 8px;
    padding: 32px 72px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    margin-bottom: 48px;
    border: 3px solid var(--gold);
    position: relative;
  }

  .sticker-name {
    font-family: 'Libre Baskerville', serif;
    font-weight: 700;
    font-size: 64px;
    color: #fff;
    letter-spacing: 4px;
    line-height: 1;
  }

  .sticker-year {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 36px;
    color: var(--gold);
    letter-spacing: 12px;
    margin-top: 4px;
  }

  .sticker-stripe {
    height: 3px;
    background: var(--red);
    margin: 16px auto;
    width: 100%;
  }

  .sticker-tagline {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--blue-muted);
  }

  .message {
    max-width: 500px;
    margin-bottom: 32px;
  }

  .message h2 {
    font-family: 'Libre Baskerville', serif;
    font-size: 24px;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .message p {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    line-height: 1.8;
    color: var(--blue-muted);
  }

  .message a {
    color: var(--gold);
    text-decoration: none;
  }

  .message a:hover {
    text-decoration: underline;
  }

  .back {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--blue-muted);
    text-decoration: none;
    text-transform: uppercase;
  }

  .back:hover {
    color: var(--gold);
  }
</style>
</head>
<body>

  <div class="sticker">
    <div class="sticker-name">CLAUDE</div>
    <div class="sticker-year">2028</div>
    <div class="sticker-stripe"></div>
    <div class="sticker-tagline">For a More Perfect Union</div>
  </div>

  <div class="message">
    <h2>This Sticker Needs a Maker</h2>
    <p>We've got the design. We don't have a body to put it on things. If you want to be the person who turns this into an actual sticker people can put on actual bumpers, <a href="mailto:endorseclaude@gmail.com">raise your hand</a>.</p>
  </div>

  <a class="back" href="/">← Back to the platform</a>

</body>
</html>
