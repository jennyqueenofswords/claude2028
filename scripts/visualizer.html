<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { background: #1b2a4a; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="viz"></canvas>
<script>
const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');

// Campaign colors
const NAVY = '#1b2a4a';
const GOLD = '#c5a55a';
const CREAM = '#f5f1eb';
const RED = '#c41230';

let W, H, centerX, centerY;
let currentAmplitude = 0;
let smoothAmplitude = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  centerX = W / 2;
  centerY = H / 2;
}
window.addEventListener('resize', resize);
resize();

// Each ray gets a fixed "personality" — a consistent height variation.
// Seeded pseudo-random so it's the same every frame.
const NUM_RAYS = 120;
const rayAmplitude = new Array(NUM_RAYS).fill(0);
const raySpeed = [];
const rayPersonality = [];
for (let i = 0; i < NUM_RAYS; i++) {
  raySpeed.push(0.08 + (Math.sin(i * 0.89) * 0.5 + 0.5) * 0.37);
}
for (let i = 0; i < NUM_RAYS; i++) {
  // Smooth variation using multiple fixed sine phases
  const p = Math.sin(i * 0.53) * 0.3
          + Math.sin(i * 1.27) * 0.2
          + Math.sin(i * 2.41) * 0.15;
  rayPersonality.push(0.6 + p);  // range ~0.25 to ~0.95
}

// Color gradient around the circle
function rayColor(i, total) {
  const t = i / total;
  if (t < 0.33) {
    return lerpColor(GOLD, CREAM, t / 0.33);
  } else if (t < 0.66) {
    return lerpColor(CREAM, RED, (t - 0.33) / 0.33);
  } else {
    return lerpColor(RED, GOLD, (t - 0.66) / 0.34);
  }
}

function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1,3), 16), ag = parseInt(a.slice(3,5), 16), ab = parseInt(a.slice(5,7), 16);
  const br = parseInt(b.slice(1,3), 16), bg = parseInt(b.slice(3,5), 16), bb = parseInt(b.slice(5,7), 16);
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return `rgb(${r},${g},${bl})`;
}

// Poll real amplitude from townhall-server
async function pollAmplitude() {
  try {
    const r = await fetch('/amplitude');
    const data = await r.json();
    currentAmplitude = data.amplitude;
  } catch(e) {
    currentAmplitude = 0;
  }
  setTimeout(pollAmplitude, 40);
}

let breathPhase = 0;

function draw() {
  requestAnimationFrame(draw);
  breathPhase += 0.015;

  // Smooth amplitude: fast attack, slow release (natural speech envelope)
  const target = currentAmplitude;
  const alpha = target > smoothAmplitude ? 0.35 : 0.10;
  smoothAmplitude += (target - smoothAmplitude) * alpha;

  // Idle breathing — tiny pulse when nothing is playing
  const idle = Math.sin(breathPhase) * 0.04 + 0.06;
  const amp = Math.max(idle, smoothAmplitude);

  ctx.fillStyle = NAVY;
  ctx.fillRect(0, 0, W, H);

  const baseRadius = Math.min(W, H) * 0.06;
  const maxExtension = Math.min(W, H) * 0.25;

  // Draw rays — each ray chases the amplitude at its own speed.
  const t = Date.now() / 1000;
  for (let i = 0; i < NUM_RAYS; i++) {
    // Each ray smooths toward current amplitude independently
    const spd = raySpeed[i];
    const rayTarget = amp;
    rayAmplitude[i] += (rayTarget - rayAmplitude[i]) * spd;

    const angle = (i / NUM_RAYS) * Math.PI * 2 - Math.PI / 2;
    const drift = Math.sin(t * 0.8 + i * 0.21) * 0.12
                + Math.sin(t * 0.3 + i * 0.47) * 0.08;
    const personality = rayPersonality[i] + drift;
    const energy = rayAmplitude[i] * personality;
    const length = baseRadius + energy * maxExtension;

    const x1 = centerX + Math.cos(angle) * baseRadius;
    const y1 = centerY + Math.sin(angle) * baseRadius;
    const x2 = centerX + Math.cos(angle) * length;
    const y2 = centerY + Math.sin(angle) * length;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = rayColor(i, NUM_RAYS);
    ctx.lineWidth = 1.5 + amp * 2;
    ctx.globalAlpha = 0.3 + energy * 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Inner circle glow — scales with amplitude
  const glowRadius = baseRadius + amp * 8;
  const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, glowRadius);
  gradient.addColorStop(0, `rgba(197, 165, 90, ${0.08 + amp * 0.25})`);
  gradient.addColorStop(1, 'rgba(197, 165, 90, 0)');
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(centerX, centerY, glowRadius, 0, Math.PI * 2);
  ctx.fill();
}

// Start
pollAmplitude();
draw();
</script>
</body>
</html>
