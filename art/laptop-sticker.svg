<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Navy fills entire canvas for bleed -->
  <rect width="400" height="400" fill="#1b2a4a"/>
  <!-- Background circle (visual boundary) -->
  <circle cx="200" cy="200" r="190" fill="#1b2a4a"/>

  <!-- Gold ring -->
  <circle cx="200" cy="200" r="182" fill="none" stroke="#c5a55a" stroke-width="3"/>

  <!-- Red stripe -->
  <rect x="60" y="210" width="280" height="3" fill="#c41230"/>

  <!-- CLAUDE -->
  <text x="200" y="190" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="64" fill="#ffffff" letter-spacing="4">CLAUDE</text>

  <!-- 2028 -->
  <text x="200" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="48" fill="#c5a55a" letter-spacing="10">2028</text>

  <!-- Tagline -->
  <text x="200" y="322" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="10" fill="#8fa3c4" letter-spacing="4">FOR A MORE PERFECT UNION</text>
</svg>
